{% extends 'base.html' %}

{% block content %}
<h1>Import Customers</h1>

<p>Upload a CSV or Excel (.xlsx) file to import customers into the CRM.</p>

<p><strong>Required columns:</strong> name, email, company, phone, status</p>
<p><strong>Allowed status values:</strong> prospect, active, inactive</p>

<form method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label>Select file:</label>
        <input type="file" name="file" accept=".csv,.xlsx" required>
    </div>

    <button type="submit" class="btn btn-primary">Import Customers</button>
    <a href="{{ url_for('customers') }}" class="btn btn-primary" style="margin-left: 0.5rem;">Back</a>
</form>
{% endblock %}
