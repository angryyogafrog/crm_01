{% extends 'base.html' %}

{% block content %}
<h1>Edit Lead</h1>

<form method="POST">
    <label for="name">Name</label><br>
    <input type="text" id="name" name="name" value="{{ lead.name }}" required><br><br>

    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" value="{{ lead.email }}" required><br><br>

    <label for="company">Company</label><br>
    <input type="text" id="company" name="company" value="{{ lead.company }}" required><br><br>

    <label for="value">Value</label><br>
    <input type="number" id="value" name="value" step="0.01" value="{{ lead.value }}" required><br><br>

    <label for="source">Source</label><br>
    <input type="text" id="source" name="source" value="{{ lead.source }}" required><br><br>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('lead_detail', lead_id=lead.id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
