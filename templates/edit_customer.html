{% extends 'base.html' %}

{% block title %}Edit Customer - CRM{% endblock %}

{% block content %}
<h1>Edit Customer</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ customer.name }}" required>
    </div>

    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ customer.email }}" required>
    </div>

    <div class="form-group">
        <label for="company">Company:</label>
        <input type="text" id="company" name="company" value="{{ customer.company }}">
    </div>

    <div class="form-group">
        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" value="{{ customer.phone }}">
    </div>

    <div class="form-group">
        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="prospect" {% if customer.status == 'prospect' %}selected{% endif %}>prospect</option>
            <option value="active" {% if customer.status == 'active' %}selected{% endif %}>active</option>
            <option value="inactive" {% if customer.status == 'inactive' %}selected{% endif %}>inactive</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
</form>
{% endblock %}
